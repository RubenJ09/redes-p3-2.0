{% extends 'base.html' %}
{% block title %}Borrar regla{% endblock %}
{% block content %}
<div class="panel">
  <h1>Borrar regla</h1>
  <p>¿Seguro que quieres borrar la regla {{ object.raw_text }}?</p>
  <form method="post">
    {% csrf_token %}
    <button class="button danger" type="submit">Sí, borrar</button>
    <a class="button secondary" href="{% url 'rules:list' %}">Cancelar</a>
  </form>
</div>
{% endblock %}
